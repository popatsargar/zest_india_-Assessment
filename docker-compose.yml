services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: zest-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ZestIndia@12345"
    ports:
      - "1433:1433"
    volumes:
      - zest-sql-data:/var/opt/mssql
    restart: unless-stopped

volumes:
  zest-sql-data:
